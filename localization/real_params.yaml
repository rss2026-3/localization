particle_filter:
  ros__parameters:
    # --- Particle count ---
    # More particles = more accurate but slower. 100-200 is a good range on the car.
    num_particles: 100

    # --- LiDAR downsampling ---
    # Number of beams used per particle for sensor model evaluation.
    # Lower = faster, higher = more accurate. 99 is a good balance.
    num_beams_per_particle: 99

    # The field of view centered around theta=0 (radians). ~270 deg for Hokuyo.
    scan_field_of_view: 4.71

    # Discretize the theta space for faster ray tracing
    scan_theta_discretization: 500.0

    # --- Topics ---
    map_topic: "/map"
    scan_topic: "/scan"
    odom_topic: "/vesc/odom"

    # --- Frames ---
    # The frame to publish the map->car transform to
    particle_filter_frame: "/base_link"

    # --- Motion model noise ---
    # Noise stds that scale with odometry magnitude.
    # Increase if particles lose track during fast/sharp turns.
    # Decrease if particles spread too much on straight runs.
    odom_noise_x: 0.1
    odom_noise_y: 0.1
    odom_noise_theta: 0.05

    # --- Post-resample noise ---
    # Small jitter added after resampling to maintain diversity.
    # Increase slightly if filter collapses (all particles converge too fast).
    resample_noise_xy: 0.05
    resample_noise_theta: 0.01

    # Set to true to disable all noise (useful for debugging)
    deterministic: false

    lidar_scale_to_map_scale: 1.0
